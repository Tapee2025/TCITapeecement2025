name: Keep Supabase Awake

on:
  schedule:
    # Runs automatically every 4 days at midnight UTC
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Allows you to trigger it manually anytime to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Force Live Database Query
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 1. Strip any potential hidden spaces or trailing slashes from the URL variable
          CLEAN_URL=$(echo "${SUPABASE_URL}" | sed 's:/*$::')
          
          # 2. Build the full target endpoint cleanly hitting a default open config path
          TARGET_ENDPOINT="${CLEAN_URL}/rest/v1/openapi"
          
          echo "Sending query to active PostgREST engine..."
          
          # 3. Deliver the authenticated request
          curl -i -X GET "$TARGET_ENDPOINT" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"
