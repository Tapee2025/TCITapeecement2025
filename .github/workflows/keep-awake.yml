name: Keep Supabase Awake via App Login

on:
  schedule:
    - cron: '0 0 */4 * *' # Runs automatically every 4 days
  workflow_dispatch: # Allows you to trigger it manually anytime

jobs:
  simulate-login:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate on Tapee App
        run: |
          echo "Simulating user login to refresh Supabase traffic..."
          
          # This script sends an official authentication request directly to your Supabase Auth service
          curl -i -X POST "${{ secrets.SUPABASE_URL }}/auth/v1/token?grant_type=password" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"email": "admin.tapeee@gmail.com", "password": "Admin@123456"}'
