name: Keep Supabase Awake

on:
  schedule:
    # Runs automatically every 4 days at midnight UTC
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Allows you to trigger it manually anytime to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Force Native GraphQL Database Query
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 1. Clean up trailing slashes from the base URL
          CLEAN_URL=$(echo "${SUPABASE_URL}" | sed 's:/*$::')
          
          # 2. Target the GraphQL endpoint which processes directly inside Postgres
          TARGET_ENDPOINT="${CLEAN_URL}/graphql/v1"
          
          echo "Sending native database query to GraphQL engine..."
          
          # 3. Post a standard schema introspection query
          curl -i -X POST "$TARGET_ENDPOINT" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"query": "{ __schema { queryType { name } } }"}'
